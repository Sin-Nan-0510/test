<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>藥水 CP 值表</title>
<style>
body {
  font-family: 'Arial', sans-serif;
  padding: 20px;
  background: linear-gradient(135deg, #f0f4f7, #d9e2ec);
  color: #333;
}
h1 { text-align: center; color: #1a73e8; }
h2 { color: #1a73e8; margin-top: 40px; }
button, label { margin: 5px; font-size: 14px; }
table {
  width: 100%; border-collapse: collapse; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
  border-radius: 8px; overflow: hidden; margin-bottom: 40px;
}
th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
th {
  background-color: #1a73e8; color: #fff; position: sticky; top: 0; cursor: pointer;
}
tr:hover { background-color: #f1f7ff; }
@media(max-width: 768px) {
  table, thead, tbody, th, td, tr { display: block; }
  thead tr { display: none; }
  tr { margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; }
  td { text-align: right; padding-left: 50%; position: relative; }
  td::before { content: attr(data-label); position: absolute; left: 10px; font-weight: bold; text-align: left; }
}
.checkbox-group { margin: 10px 0; }
.checkbox-group label { display: inline-block; background: #e2e8f0; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
.checkbox-group input { margin-right: 5px; }
</style>
</head>
<body>

<h1>藥水 CP 值表</h1>

<h2>HP 藥水</h2>
<button id="toggleHP" onclick="toggleAllData('HP')">展開全部資料</button>
<button onclick="selectAll('HP')">全選</button>
<button onclick="deselectAll('HP')">取消全選</button>
<div class="checkbox-group" id="checkboxHP"></div>
<table id="tableHP">
  <thead>
    <tr>
      <th>藥水名稱</th>
      <th>補量</th>
      <th>價格</th>
      <th>CP值</th>
      <th>購買地</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>MP 藥水</h2>
<button id="toggleMP" onclick="toggleAllData('MP')">展開全部資料</button>
<button onclick="selectAll('MP')">全選</button>
<button onclick="deselectAll('MP')">取消全選</button>
<div class="checkbox-group" id="checkboxMP"></div>
<table id="tableMP">
  <thead>
    <tr>
      <th>藥水名稱</th>
      <th>補量</th>
      <th>價格</th>
      <th>CP值</th>
      <th>購買地</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
// ----------------------- 資料 -----------------------
const rawDataHP = [
  {name:"蘋果",amount:30,price:28,cp:1.071,place:"防衛本部"},
  {name:"蘋果",amount:30,price:30,cp:1,place:"其餘地圖"},
  {name:"紅色藥水、雞蛋",amount:50,price:47,cp:1.064,place:"玩具城、愛塔-糖果機、防衛本部"},
  {name:"紅色藥水、雞蛋",amount:50,price:50,cp:1,place:"其餘地圖"},
  {name:"烤肉",amount:100,price:106,cp:0.943,place:"全藥水店均一價"},
  {name:"橘色藥水",amount:150,price:152,cp:0.987,place:"玩具城、愛塔-糖果機、防衛本部"},
  {name:"橘色藥水",amount:160,price:160,cp:0.938,place:"其餘地圖"},
  {name:"炸雞",amount:200,price:209,cp:0.957,place:"玩具城、愛塔-糖果機"},
  {name:"炸雞",amount:220,price:220,cp:0.909,place:"螞蟻洞"},
  {name:"白色藥水",amount:300,price:304,cp:0.987,place:"玩具城、愛塔-糖果機、防衛本部"},
  {name:"白色藥水",amount:310,price:310,cp:0.968,place:"煉金術士珍任務"},
  {name:"白色藥水",amount:320,price:320,cp:0.938,place:"其餘地圖"},
  {name:"大熱狗",amount:300,price:304,cp:0.987,place:"玩具城、愛塔-糖果機"},
  {name:"大熱狗",amount:320,price:320,cp:0.938,place:"螞蟻洞"},
  {name:"披薩、漢堡",amount:400,price:427,cp:0.937,place:"玩具城、愛塔-糖果機"},
  {name:"披薩、漢堡",amount:450,price:450,cp:0.889,place:"螞蟻洞"},
  {name:"熱狗堡",amount:500,price:503,cp:0.994,place:"玩具城、愛塔-糖果機"},
  {name:"熱狗堡",amount:530,price:530,cp:0.943,place:"螞蟻洞"},
  {name:"鹽味拉麵",amount:500,price:550,cp:0.909,place:"古代神社"},
  {name:"豚骨拉麵",amount:800,price:850,cp:0.941,place:"古代神社"},
  {name:"烤鰻魚",amount:1000,price:1045,cp:0.957,place:"防衛本部"},
  {name:"烤鰻魚",amount:1060,price:1060,cp:0.943,place:"煉金術士珍任務"},
  {name:"烤鰻魚",amount:1100,price:1100,cp:0.909,place:"奇幻村桑拿、螞蟻洞、天城、冰原、童話村"},
  {name:"拉麵",amount:1000,price:1100,cp:0.909,place:"古代神社"},
  {name:"中華拉麵",amount:1500,price:1600,cp:0.938,place:"古代神社"},
  {name:"棒冰棒",amount:2000,price:2185,cp:0.915,place:"玩具城、愛塔-糖果機、防衛本部"},
  {name:"乳酪",amount:4000,price:4500,cp:0.889,place:"冰原、童話村、不夜城"},
  {name:"馴鹿奶",amount:5000,price:5600,cp:0.893,place:"冰原、防衛本部、童話村"}
];

const rawDataMP = [
  {name:"柳橙",amount:50,price:95,cp:0.526,place:"防衛本部"},
  {name:"柳橙",amount:50,price:97,cp:0.515,place:"魔森"},
  {name:"藍色藥水",amount:100,price:190,cp:0.526,place:"玩具城、愛塔-糖果機、防衛本部"},
  {name:"藍色藥水",amount:100,price:192,cp:0.521,place:"魔森"},
  {name:"檸檬",amount:150,price:294,cp:0.51,place:"防衛本部"},
  {name:"檸檬",amount:150,price:305,cp:0.492,place:"魔森"},
  {name:"沙拉",amount:200,price:420,cp:0.476,place:"螞蟻洞"},
  {name:"魚板(串)",amount:250,price:550,cp:0.454,place:"古代神社"},
  {name:"活力藥水",amount:300,price:589,cp:0.509,place:"玩具城、愛塔-糖果機、防衛本部"},
  {name:"活力藥水",amount:300,price:604,cp:0.497,place:"魔森"},
  {name:"魚板(盤)",amount:500,price:1300,cp:0.385,place:"古代神社"},
  {name:"礦泉水",amount:800,price:1567,cp:0.511,place:"防衛本部"},
  {name:"紅豆刨冰",amount:2000,price:3800,cp:0.526,place:"玩具城、愛塔-糖果機、防衛本部"},
  {name:"清晨之露",amount:4000,price:7695,cp:0.52,place:"防衛本部"},
  {name:"黃昏之露",amount:5000,price:9690,cp:0.516,place:"防衛本部"}
];

// ----------------------- 函數 -----------------------
let showAllHP = false;
let showAllMP = false;
let sortOrder = {};

function getBestCP(data){
  const best = {};
  data.forEach(item=>{ if(!best[item.name]||item.cp>best[item.name].cp) best[item.name]=item; });
  return Object.values(best);
}

function initCheckboxes(){
  ['HP','MP'].forEach(type=>{
    const raw = type==='HP'?rawDataHP:rawDataMP;
    const container = document.getElementById(`checkbox${type}`);
    const uniqueNames = [...new Set(raw.map(i=>i.name))];
    uniqueNames.forEach(name=>{
      const label = document.createElement('label');
      label.innerHTML = `<input type="checkbox" value="${name}" onchange="renderTable('${type}')"> ${name}`;
      container.appendChild(label);
    });
  });
}

function getSelectedNames(type){
  const checkboxes = document.querySelectorAll(`#checkbox${type} input[type="checkbox"]:checked`);
  return Array.from(checkboxes).map(c=>c.value);
}

function selectAll(type){
  document.querySelectorAll(`#checkbox${type} input[type="checkbox"]`).forEach(cb=>cb.checked=true);
  renderTable(type);
}

function deselectAll(type){
  document.querySelectorAll(`#checkbox${type} input[type="checkbox"]`).forEach(cb=>cb.checked=false);
  renderTable(type);
}

function renderTable(type){
  const tbody = document.querySelector(`#table${type} tbody`);
  tbody.innerHTML = "";
  const showAll = type==='HP'?showAllHP:showAllMP;
  const raw = type==='HP'?rawDataHP:rawDataMP;
  const baseData = showAll?raw:getBestCP(raw);

  const selected = getSelectedNames(type);
  const dataToShow = selected.length>0?baseData.filter(i=>selected.includes(i.name)):baseData;

  const tableSort = sortOrder[type]||{key:'cp',asc:false};
  dataToShow.sort((a,b)=>{
    if(typeof a[tableSort.key]==='string') return tableSort.asc?a[tableSort.key].localeCompare(b[tableSort.key]):b[tableSort.key].localeCompare(a[tableSort.key]);
    return tableSort.asc?a[tableSort.key]-b[tableSort.key]:b[tableSort.key]-a[tableSort.key];
  });

  dataToShow.forEach(item=>{
    const tr=document.createElement('tr');
    tr.innerHTML = `<td data-label="藥水名稱">${item.name}</td>
                    <td data-label="補量">${item.amount}</td>
                    <td data-label="價格">${item.price}</td>
                    <td data-label="CP值">${item.cp.toFixed(3)}</td>
                    <td data-label="購買地">${item.place}</td>`;
    tbody.appendChild(tr);
  });

  const headers = document.querySelectorAll(`#table${type} th`);
  headers.forEach(th=>{
    th.onclick=()=>{
      const keyMap={'藥水名稱':'name','補量':'amount','價格':'price','CP值':'cp','購買地':'place'};
      const key=keyMap[th.innerText];
      if(sortOrder[type]&&sortOrder[type].key===key) sortOrder[type].asc=!sortOrder[type].asc;
      else sortOrder[type]={key,asc:true};
      renderTable(type);
    };
  });
}

function toggleAllData(type){
  if(type==='HP'){ showAllHP=!showAllHP; document.getElementById("toggleHP").innerText=showAllHP?"只顯示 CP值最高":"展開全部資料";}
  else{ showAllMP=!showAllMP; document.getElementById("toggleMP").innerText=showAllMP?"只顯示 CP值最高":"展開全部資料";}
  renderTable(type);
}

// ----------------------- 初始化 -----------------------
document.addEventListener('DOMContentLoaded',()=>{
  initCheckboxes();
  renderTable('HP');
  renderTable('MP');
});
</script>
</body>
</html>
